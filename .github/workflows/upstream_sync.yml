name: Upstream Sync

on:
  schedule:
    # Run every Monday at 00:00 UTC
    - cron: '0 0 * * 1'
  workflow_dispatch:
    inputs:
      force:
        description: 'Force create PR even if one already exists'
        required: false
        default: 'false'

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Add upstream remote
        run: git remote add upstream https://github.com/zed-industries/zed.git

      - name: Fetch upstream
        run: git fetch upstream main

      - name: Check for existing sync PR
        id: check_pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          existing=$(gh pr list \
            --head "upstream-sync" \
            --state open \
            --json number \
            --jq '.[0].number' 2>/dev/null || echo "")
          if [ -n "$existing" ] && [ "${{ github.event.inputs.force }}" != "true" ]; then
            echo "open_pr=$existing" >> "$GITHUB_OUTPUT"
            echo "Existing sync PR #$existing found. Skipping."
          else
            echo "open_pr=" >> "$GITHUB_OUTPUT"
          fi

      - name: Create sync branch and merge upstream
        if: steps.check_pr.outputs.open_pr == ''
        id: merge
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Delete local branch if it exists from a previous run
          git branch -D upstream-sync 2>/dev/null || true

          git checkout -b upstream-sync

          # Attempt merge; allow conflicts to remain in the tree
          if git merge upstream/main --no-edit 2>merge_output.txt; then
            echo "has_conflicts=false" >> "$GITHUB_OUTPUT"
            echo "merge_result=clean" >> "$GITHUB_OUTPUT"
          else
            # Check if there are unresolved conflicts
            if git diff --name-only --diff-filter=U | grep -q .; then
              echo "has_conflicts=true" >> "$GITHUB_OUTPUT"
              echo "merge_result=conflicts" >> "$GITHUB_OUTPUT"
            else
              echo "has_conflicts=false" >> "$GITHUB_OUTPUT"
              echo "merge_result=failed" >> "$GITHUB_OUTPUT"
              cat merge_output.txt
              exit 1
            fi
          fi

      - name: Push sync branch
        if: steps.check_pr.outputs.open_pr == ''
        run: git push origin upstream-sync --force

      - name: Get upstream commit info
        if: steps.check_pr.outputs.open_pr == ''
        id: upstream_info
        run: |
          UPSTREAM_SHA=$(git rev-parse upstream/main)
          UPSTREAM_MSG=$(git log -1 --format='%h %s' upstream/main)
          echo "sha=$UPSTREAM_SHA" >> "$GITHUB_OUTPUT"
          echo "msg=$UPSTREAM_MSG" >> "$GITHUB_OUTPUT"

      - name: Create or update pull request
        if: steps.check_pr.outputs.open_pr == ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          CONFLICT_LABEL=""
          BODY="This PR syncs the fork with upstream \`zed-industries/zed\` main branch."

          if [ "${{ steps.merge.outputs.has_conflicts }}" = "true" ]; then
            CONFLICT_LABEL="⚠️ **Has merge conflicts — manual resolution required**"
            BODY="$BODY

          $CONFLICT_LABEL

          ### Resolving conflicts
          1. Checkout this branch locally
          2. Resolve the conflicting files
          3. \`git add\` the resolved files and \`git commit\`
          4. Push the changes to this branch"

            # Add conflict files list
            CONFLICT_FILES=$(git diff --name-only --diff-filter=U)
            BODY="$BODY

          ### Conflicting files
          $(echo "$CONFLICT_FILES" | sed 's/^/- /')"
          else
            BODY="$BODY

          ✅ **No merge conflicts — ready to merge.**"
          fi

          BODY="$BODY

          ---
          Upstream latest: \`${{ steps.upstream_info.outputs.msg }}\``
          PR_TITLE="Sync upstream: zed-industries/zed"

          # Check if PR already exists (e.g., from force re-run)
          EXISTING=$(gh pr list --head upstream-sync --state open --json number --jq '.[0].number' 2>/dev/null || echo "")

          if [ -n "$EXISTING" ]; then
            # Update existing PR
            gh pr edit "$EXISTING" --body "$BODY" --title "$PR_TITLE"
            echo "Updated existing PR #$EXISTING"
          else
            # Create new PR
            gh pr create \
              --base main \
              --head upstream-sync \
              --title "$PR_TITLE" \
              --body "$BODY" \
              --label "upstream-sync"
          fi